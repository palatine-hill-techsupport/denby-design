<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1217 828" role="img" aria-labelledby="title desc">
  <title id="title">JB Retro-Fi project screenshot</title>
  <desc id="desc">A late nineties JB Hi-Fi inspired webpage with a dark CRT scanline texture, yellow logo, side navigation, and special thanks credit.</desc>
  <defs>
    <pattern id="scan" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#020505"/>
      <rect y="1" width="8" height="1" fill="#0d1514" opacity=".8"/>
      <rect x="1" width="1" height="4" fill="#101010" opacity=".35"/>
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation=".35"/>
    </filter>
  </defs>
  <rect width="1217" height="828" fill="#020505"/>
  <rect width="1217" height="828" fill="url(#scan)" opacity=".95"/>
  <rect x="8" y="6" width="140" height="518" fill="#20232d" stroke="#9ba0ad" stroke-width="2" opacity=".92"/>
  <g font-family="Georgia, serif" font-size="12" font-style="italic" font-weight="700" fill="#fff" text-anchor="middle">
    <g fill="#f2ff00"><rect x="20" y="16" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="35">Dept.</text></g>

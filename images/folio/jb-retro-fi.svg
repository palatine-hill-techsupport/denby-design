    <g><rect x="82" y="53" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="72">TVs</text></g>
    <g><rect x="20" y="90" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="109">Audio</text></g>
    <g><rect x="82" y="90" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="109">Comput.</text></g>
    <g><rect x="20" y="127" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="146">PC Parts</text></g>
    <g><rect x="82" y="127" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="146">Gaming</text></g>
    <g><rect x="20" y="164" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="183">Mobile</text></g>
    <g><rect x="82" y="164" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="178">Movies +</text><text x="110" y="190">TV</text></g>
    <g><rect x="20" y="201" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="220">Music</text></g>
    <g><rect x="82" y="201" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="220">Applian.</text></g>
    <g><rect x="20" y="238" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="250">Smart</text><text x="47" y="262">Home</text></g>
    <g><rect x="82" y="238" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="257">Collect.</text></g>
    <g><rect x="20" y="275" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="287">Office</text><text x="47" y="299">Tech</text></g>
    <g><rect x="82" y="275" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="110" y="287">Extra</text><text x="110" y="299">Care</text></g>
    <g><rect x="20" y="329" width="55" height="28" fill="#1d1e27" stroke="#8a8e9c"/><text x="47" y="348">Trade In</text></g>

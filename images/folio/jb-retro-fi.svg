  <rect x="31" y="421" width="95" height="48" fill="#171819" stroke="#c7c8d2"/>
  <text x="78" y="449" font-family="Arial Black, Impact, sans-serif" font-size="28" font-weight="900" fill="#f2ff00" text-anchor="middle">JB</text>
  <text x="78" y="461" font-family="Arial Black, Impact, sans-serif" font-size="13" font-weight="900" fill="#f2ff00" text-anchor="middle">HI-FI</text>
  <rect x="38" y="479" width="80" height="18" fill="#171819" stroke="#c7c8d2"/>
  <text x="78" y="493" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="13" fill="#f2ff00" text-anchor="middle">CRT On</text>
  <g filter="url(#glow)" fill="#eaff00" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle">
    <path d="M574 88h-22c-9 0-17 8-17 17v63c0 9 8 17 17 17h22M845 88h15c9 0 17 8 17 17v63c0 9-8 17-17 17h-15" fill="none" stroke="#eaff00" stroke-width="5"/>
    <text x="705" y="134" font-size="136">JB</text>
    <text x="705" y="215" font-size="76">HI-FI</text>
  </g>
  <rect x="510" y="262" width="392" height="29" rx="3" fill="#121616" stroke="#7c8789"/>
  <g font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="18" fill="#f2ff00" text-anchor="middle"><text x="543" y="282">Charts</text><text x="710" y="282">Album of the week</text><text x="868" y="282">News</text></g>
  <g font-family="Georgia, serif" filter="url(#soft)">
    <text x="710" y="341" font-size="32" font-weight="700" fill="#f2ff00" text-anchor="middle">Welcome To JB Hi-Fi</text>
    <text x="218" y="375" font-size="16" font-weight="700" fill="#fff">Established in 1975, JB Hi-Fi began as a retailer in East Keilor, Victoria, Australia with one simple philosophy: to deliver a specialist range of hi-fi and</text>
    <text x="218" y="394" font-size="16" font-weight="700" fill="#fff">recorded music at Australia's lowest prices.</text>
    <text x="218" y="427" font-size="16" font-weight="700" fill="#fff">Now, maintaining this philosophy, JB is Australia's leading independent retailer of home entertainment and recorded music. This retro microsite rebuilds the</text>
    <text x="218" y="446" font-size="16" font-weight="700" fill="#fff">late-90s vibe with scanlines, chunky navigation, theatrical product departments, and gloriously loud yellow type.</text>
    <text x="710" y="543" font-size="25" font-weight="700" fill="#f2ff00" text-anchor="middle">JB, You've done it again!</text>
    <text x="218" y="578" font-size="16" font-weight="700" fill="#fff">Please Note: this portfolio project is a loving retro web experiment inspired by the original JB Hi-Fi online era.</text>
    <text x="218" y="628" font-size="16" font-weight="700" fill="#fff">Special thanks to Finbar O'Hanlon for the original web design inspiration that helped shape this tribute.</text>
    <text x="710" y="685" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Copyright 1999 JB Hi Fi</text>
    <text x="745" y="718" font-size="14" font-style="italic" fill="#a8a8b0" text-anchor="middle">Web Design</text>
    <text x="745" y="735" font-size="14" font-style="italic" fill="#a8a8b0" text-anchor="middle">By</text>
    <text x="745" y="752" font-size="16" font-style="italic" fill="#a8a8b0" text-anchor="middle">Finbar O'Hanlon</text>
    <text x="710" y="796" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">For Best Viewing set screen to 800 x 600 and use a 4.0 or later browser</text>
  </g>
</svg>
